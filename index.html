<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arunachalam Manikandan</title>
  <meta name="description" content="CS Grad Student at UMN · AI Engineer · Builder" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <div class="container">
      <a href="index.html" class="nav-name">Arunachalam Manikandan</a>
      <ul class="nav-links">
        <li><a href="blog.html">Blogs</a></li>
        <li><button class="theme-toggle" id="theme-btn" aria-label="Toggle theme">○ Light</button></li>
      </ul>
    </div>
  </nav>

  <main>
    <div class="container" id="profile-root">
      <p class="loading">Loading…</p>
    </div>
  </main>

  <div class="lightbox-overlay" id="lightbox">
    <img src="assets/avatar.jpg" alt="Arunachalam Manikandan" />
  </div>

  <footer>
    <div class="container">
      <span id="footer-name">Arunachalam Manikandan</span>
      <span>Designed by my brain. Assembled by Claude</span>
    </div>
  </footer>

  <script>
    (function() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <script>
    async function loadProfile() {
      const root = document.getElementById('profile-root');
      try {
        const res = await fetch('profile.json');
        if (!res.ok) throw new Error('Could not load profile data.');
        const p = await res.json();

        document.title = p.name;
        document.querySelector('meta[name="description"]').content = p.tagline;
        document.getElementById('footer-name').textContent = p.name;
        document.querySelector('.nav-name').textContent = p.name;

        root.innerHTML = `
          ${bio(p)}
          ${experience(p.experience)}
          ${projects(p.projects)}
          ${skills(p.skills)}
          ${education(p.education)}
          ${awards(p.awards)}
          ${publications(p.publications)}
        `;
      } catch (err) {
        root.innerHTML = `<p class="error-msg">${err.message}</p>`;
      }
    }

    function bio(p) {
      const links = Object.entries({
        LinkedIn: p.links.linkedin,
        GitHub:   p.links.github,
        Email:    p.links.email ? `mailto:${p.links.email}` : null,
        Blogs:    'blog.html',
      })
        .filter(([, href]) => href)
        .map(([label, href]) => `<li><a href="${href}" ${href.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>${label}</a></li>`)
        .join('');

      return `
        <div class="section profile-header">
          <div class="profile-intro">
            <img src="assets/avatar.jpg" alt="${esc(p.name)}" class="profile-photo" />
            <div class="profile-intro-text">
              <h1>${esc(p.name)}</h1>
              <p class="tagline">${esc(p.tagline)}</p>
            </div>
          </div>
          <p class="bio">${esc(p.bio)}</p>
          <ul class="links-row">${links}</ul>
        </div>
      `;
    }

    function experience(items) {
      const entries = items.map(e => `
        <div class="entry">
          <div class="entry-header">
            <h3>${esc(e.company)}</h3>
            <span class="entry-meta">${esc(e.start)} – ${esc(e.end)}</span>
          </div>
          <p class="entry-sub">${esc(e.role)} · ${esc(e.location)}</p>
          ${e.bullets.length ? `<ul>${e.bullets.map(b => `<li>${esc(b)}</li>`).join('')}</ul>` : ''}
        </div>
      `).join('');
      return `<div class="section"><h2>Experience</h2>${entries}</div>`;
    }

    function projects(items) {
      const cards = items.map(proj => `
        <div class="project">
          <p class="project-title">
            ${proj.link
              ? `<a href="${proj.link}" target="_blank" rel="noopener">${esc(proj.name)}</a>`
              : esc(proj.name)}
            <span style="font-weight:400; color:var(--text-muted); font-size:0.85rem; margin-left:0.5rem;">${esc(proj.date)}</span>
          </p>
          <p class="project-desc">${esc(proj.description)}</p>
        </div>
      `).join('');
      return `<div class="section"><h2>Projects</h2>${cards}</div>`;
    }

    function skills(items) {
      const tags = items.map(s => `<li>${esc(s)}</li>`).join('');
      return `<div class="section"><h2>Skills</h2><ul class="skills-list">${tags}</ul></div>`;
    }

    function education(items) {
      const entries = items.map(e => `
        <div class="entry">
          <div class="entry-header">
            <h3>${esc(e.school)}</h3>
            <span class="entry-meta">${esc(e.start)} – ${esc(e.end)}</span>
          </div>
          <p class="entry-sub">${esc(e.degree)} · ${esc(e.gpa)} · ${esc(e.location)}</p>
          ${e.notes ? `<p style="font-size:0.875rem; color:var(--text-muted);">${esc(e.notes)}</p>` : ''}
        </div>
      `).join('');
      return `<div class="section"><h2>Education</h2>${entries}</div>`;
    }

    function awards(items) {
      const entries = items.map(a => `
        <div class="entry">
          <div class="entry-header">
            <h3>${esc(a.title)}</h3>
            <span class="entry-meta">${esc(a.date)}</span>
          </div>
          <p class="entry-sub">${esc(a.issuer)}</p>
          <p style="font-size:0.875rem; color:var(--text-muted);">${esc(a.description)}</p>
        </div>
      `).join('');
      return `<div class="section"><h2>Awards</h2>${entries}</div>`;
    }

    function publications(items) {
      const entries = items.map(pub => `
        <div class="project">
          <p class="project-title">
            <a href="${pub.link}" target="_blank" rel="noopener">${esc(pub.title)}</a>
          </p>
          <p class="project-desc">${esc(pub.venue)}</p>
        </div>
      `).join('');
      return `<div class="section"><h2>Publications</h2>${entries}</div>`;
    }

    function esc(str) {
      if (!str) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    loadProfile();

    // Lightbox — double-click profile photo
    document.addEventListener('dblclick', e => {
      if (e.target.classList.contains('profile-photo')) {
        document.getElementById('lightbox').classList.add('open');
      }
    });
    document.getElementById('lightbox').addEventListener('click', () => {
      document.getElementById('lightbox').classList.remove('open');
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') document.getElementById('lightbox').classList.remove('open');
    });

    // Theme toggle
    const btn = document.getElementById('theme-btn');
    function applyTheme(t) {
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      btn.textContent = t === 'dark' ? '○ Light' : '● Dark';
    }
    applyTheme(localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'));
    btn.addEventListener('click', () => {
      applyTheme(document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
    });
  </script>

</body>
</html>
